<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Anime</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../DonnéesCharts.js"></script>

  <style>
    body {
      margin: 0;
      background: #191919;
      font-family: Arial;
    }

    .container {
      width: 420px;
      height: 420px;
      margin: auto;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    @media (max-width: 600px) {
      .container {
        width: 300px;
        height: 300px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <canvas id="chart" style="width:100%; height:100%;"></canvas>
</div>

<script>
const d = WATCHLIST_DATA.anime;

const labels = [
  "In Progress",
  "Paused",
  "Not Started",
  "Rewatching",
  "Dropped",
  "Completed"
];

const values = [
  d.InProgress,
  d.Paused,
  d.NotStarted,
  d.Rewatching,
  d.Dropped,
  d.Completed
];

const total = values.reduce((a, b) => a + b, 0);

new Chart(document.getElementById("chart"), {
  type: "doughnut",

  data: {
    labels,
    datasets: [{
      data: values,

      backgroundColor: [
        "#FFD54A", // In Progress
        "#FF6FAE", // Paused
        "#4A90E2", // Not Started
        "#FF9F43", // Rewatching
        "#E74C3C", // Dropped
        "#4CAF50"  // Completed
      ],

      hoverBackgroundColor: [
        "#FFE27A",
        "#FF8BC0",
        "#6AA8F0",
        "#FFB76A",
        "#F06A5A",
        "#6AC96D"
      ],

      borderRadius: 10,
      borderWidth: 1,
      borderColor: "#191919",
      spacing: 3,
      hoverOffset: 10
    }]
  },

  options: {
    cutout: "70%",

    plugins: {
      legend: {
        display: true,
        position: "bottom",
        labels: {
          color: "#ffffff"
        }
      }
    }
  },

  plugins: [{
    id: "centerText",

    beforeDraw(chart) {
      const { width } = chart;
      const ctx = chart.ctx;

      ctx.save();

      ctx.font = "bold 28px Arial";
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillText(
        total,
        width / 2,
        chart.chartArea.top +
        (chart.chartArea.bottom - chart.chartArea.top) / 2
      );

      ctx.restore();
    }
  }]
});
</script>

</body>
</html>
