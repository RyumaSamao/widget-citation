<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>General</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../DonnéesCharts.js"></script>

  <style>
    body {
      margin: 0;
      background: #191919;
      font-family: Arial;
    }

    .container {
      width: 340px;
      height: 340px;
      margin: auto;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    @media (max-width: 600px) {
      .container {
        width: 250px;
        height: 250px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <canvas id="chart" style="width:100%; height:100%;"></canvas>
</div>

<script>

function total(category) {
  return Object.values(category).reduce((a, b) => a + b, 0);
}

const labels = [
  "Anime",
  "Animation",
  "Series",
  "Movies"
];

const values = [
  total(WATCHLIST_DATA.anime),
  total(WATCHLIST_DATA.animation),
  total(WATCHLIST_DATA.series),
  total(WATCHLIST_DATA.films)
];

const totalAll = values.reduce((a, b) => a + b, 0);

new Chart(document.getElementById("chart"), {
  type: "doughnut",

  data: {
    labels,
    datasets: [{
      data: values,

      backgroundColor: [
        "#FFD54A",
        "#A855F7",
        "#E74C3C",
        "#4CAF50"
      ],

      hoverBackgroundColor: [
        "#FFE27A",
        "#C084FC",
        "#F06A5A",
        "#6AC96D"
      ],

      borderRadius: 10,
      borderWidth: 1,
      borderColor: "#191919",
      spacing: 3,
      hoverOffset: 10
    }]
  },

  options: {
    cutout: "70%",

    plugins: {
      legend: {
        display: true,
        position: "bottom",
        labels: {
          color: "#ffffff"
        }
      }
    }
  },

  plugins: [{
    id: "centerText",

    beforeDraw(chart) {
      const { width } = chart;
      const ctx = chart.ctx;

      ctx.save();

      ctx.font = "bold 28px Arial";
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.fillText(
        totalAll,
        width / 2,
        chart.chartArea.top +
        (chart.chartArea.bottom - chart.chartArea.top) / 2
      );

      ctx.restore();
    }
  }]
});

</script>

</body>
</html>
