<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tier List : Animes</title>
<link rel="icon" type="image/jpg" href="TiersImages/favicon.jpg">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#191919;
    color:white;
    padding:25px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.tier{
    display:flex;
    margin-bottom:10px;
    min-height:110px;
    border-radius:10px;
    overflow:hidden;
}

.label{
    width:140px;
    min-width:140px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    font-weight:bold;
    color:white;
    text-align:center;
    padding:10px;
}

.dropzone{
    flex:1;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
    background:#2b2b2b;
}

.pool{
    margin-top:40px;
}

.pool h2{
    margin-bottom:15px;
}

.poolZone{
    min-height:130px;
    background:#2b2b2b;
    border-radius:10px;
    padding:10px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.card{
    width:80px;
    height:110px;
    border-radius:8px;
    cursor:grab;
    user-select:none;
    overflow:hidden;
    touch-action:none;
}

.card:not(.dragging){
    transition:.2s;
}

.card:hover{
    transform:scale(1.05);
}

.card.dragging{
    position:fixed;
    z-index:999;
    pointer-events:none;
    opacity:.85;
    cursor:grabbing;
}
    
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

button{
    margin-top:25px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

#confirmOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;

    transition:.2s;
}

#confirmOverlay.show{
    opacity:1;
    visibility:visible;
}

#confirmBox{
    width:420px;
    max-width:90%;

    background:#2b2b2b;

    border-radius:14px;

    padding:25px;

    text-align:center;

    box-shadow:0 0 30px rgba(0,0,0,.45);

    transform:scale(.85);

    transition:transform .25s ease;

    opacity:0;
}

#confirmOverlay.show #confirmBox{
    transform:scale(1);
    opacity:1;
}

#confirmBox h2{
    margin-bottom:15px;
    color:#ff5959;
}

#confirmBox p{
    color:#ddd;
    line-height:1.6;
}

.buttons{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.buttons button{
    margin:0;
    padding:10px 22px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

#cancelBtn{
    background:#555;
    color:white;
}

#cancelBtn:hover{
    background:#666;
}

#confirmBtn{
    background:#ff5959;
    color:white;
}

#confirmBtn:hover{
    background:#ff3c3c;
}

#imageViewer{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.75);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;

    transition:.2s;

    z-index:100;

}

#imageViewer.show{

    opacity:1;
    visibility:visible;

}

#imageViewer img{

    max-width:80vw;
    max-height:85vh;

    border-radius:15px;

}
    
</style>
</head>

<body>

<h1>Anime Tier List</h1>

<div class="tier">
    <div class="label" style="background:#800017;">Nation</div>
    <div class="dropzone" data-tier="Nation"></div>
</div>

<div class="tier">
    <div class="label" style="background:#ff5959;">S</div>
    <div class="dropzone" data-tier="S"></div>
</div>

<div class="tier">
    <div class="label" style="background:#ff8c42;">A</div>
    <div class="dropzone" data-tier="A"></div>
</div>

<div class="tier">
    <div class="label" style="background:#ffd93d;">B</div>
    <div class="dropzone" data-tier="B"></div>
</div>

<div class="tier">
    <div class="label" style="background:#4cd964;">C</div>
    <div class="dropzone" data-tier="C"></div>
</div>

<div class="tier">
    <div class="label" style="background:#3fa9ff;">D</div>
    <div class="dropzone" data-tier="D"></div>
</div>

<div class="tier">
    <div class="label" style="background:#9b59ff;">E</div>
    <div class="dropzone" data-tier="E"></div>
</div>

<div class="pool">
    <h2>Non classés</h2>

    <div class="poolZone dropzone" data-tier="pool">

    </div>
    
</div>

<button onclick="resetTier()">Réinitialiser</button>
<div id="confirmOverlay">

    <div id="confirmBox">

        <h2>⚠️ Réinitialiser ?</h2>

        <p>
            Cette action supprimera définitivement toute votre tier list.<br>
            Êtes-vous sûr ?
        </p>

        <div class="buttons">

            <button id="cancelBtn">Annuler</button>

            <button id="confirmBtn">Réinitialiser</button>

        </div>

    </div>

</div>

<div id="imageViewer">

    <img src="">

</div>
    
<script>

    const animes = [

    { id: "onepiece", image: "TiersImages/onepiece.jpg" },
    { id: "bluelock", image: "TiersImages/bluelock.webp" },
    { id: "chainsaw", image: "TiersImages/chainsaw.jpg" },
    { id: "clover", image: "TiersImages/clover.jpg" },
    { id: "dadadan", image: "TiersImages/dadadan.jpg" },
    { id: "demonslayer", image: "TiersImages/demonslayer.jpg" },
    { id: "jujutsu", image: "TiersImages/jujutsu.jpg" },
    { id: "kaiju", image: "TiersImages/kaiju.webp" },
    { id: "naruto", image: "TiersImages/naruto.jpg" },
    { id: "narutoS", image: "TiersImages/narutoS.jpg" },
    { id: "sololeveling", image: "TiersImages/sololeveling.jpg" },
    // Ajoute les suivants ici
];

function createCards(){

    const pool = document.querySelector('[data-tier="pool"]');

    animes.forEach(anime=>{

        const card = document.createElement("div");

        card.className = "card";
        card.id = anime.id;

        card.innerHTML = `<img src="${anime.image}" alt="${anime.id}">`;

        pool.appendChild(card);

    });

}
    
let selectedCard = null;

let offsetX = 0;
let offsetY = 0;

let startX = 0;
let startY = 0;

let moved = false;



document.addEventListener("pointerdown", (e)=>{

    const card = e.target.closest(".card");

    if(!card) return;


    selectedCard = card;


    const rect = card.getBoundingClientRect();


    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;


    startX = e.clientX;
    startY = e.clientY;


    moved = false;


});



document.addEventListener("pointermove", (e)=>{

    if(!selectedCard) return;


    const distance = Math.sqrt(
        (e.clientX - startX) ** 2 +
        (e.clientY - startY) ** 2
    );


    if(distance > 8){

        moved = true;

    }


    if(!moved) return;



    if(!selectedCard.classList.contains("dragging")){

        const rect = selectedCard.getBoundingClientRect();


        selectedCard.style.width = rect.width + "px";
        selectedCard.style.height = rect.height + "px";


        selectedCard.classList.add("dragging");

    }



    selectedCard.style.left =
        e.clientX - offsetX + "px";


    selectedCard.style.top =
        e.clientY - offsetY + "px";



    const edge = 80;
    const speed = 12;



    if(e.clientY < edge){

        window.scrollBy(0,-speed);

    }


    if(window.innerHeight - e.clientY < edge){

        window.scrollBy(0,speed);

    }


});



document.addEventListener("pointerup", (e)=>{

    if(!selectedCard) return;



    if(moved){


        const element = document.elementFromPoint(
            e.clientX,
            e.clientY
        );


        const zone = element?.closest(".dropzone");


        if(zone){

            zone.appendChild(selectedCard);

            save();

        }

    }



    selectedCard.classList.remove("dragging");


    selectedCard.style.left = "";
    selectedCard.style.top = "";
    selectedCard.style.width = "";
    selectedCard.style.height = "";


    selectedCard = null;



    setTimeout(()=>{

        moved = false;

    },100);


});
function save(){

    const data={};

    document.querySelectorAll(".dropzone").forEach(zone=>{

        data[zone.dataset.tier]=[];

        zone.querySelectorAll(".card").forEach(card=>{

            data[zone.dataset.tier].push(card.id);

        });

    });

    localStorage.setItem("AnimeTierList",JSON.stringify(data));

}

function load(){

    const data=JSON.parse(localStorage.getItem("AnimeTierList"));

    if(!data) return;

    for(const tier in data){

        const zone=document.querySelector(`[data-tier="${tier}"]`);

        data[tier].forEach(id=>{

            zone.appendChild(document.getElementById(id));

        });

    }

}

function resetTier(){

    overlay.classList.add("show");
    document.body.style.overflow = "hidden";

}

const overlay = document.getElementById("confirmOverlay");

document.getElementById("cancelBtn").onclick = () => {

    overlay.classList.remove("show");
    document.body.style.overflow = "";

};

document.getElementById("confirmBtn").onclick = () => {

    localStorage.removeItem("AnimeTierList");
    location.reload();

};

overlay.onclick = (e) => {

    if(e.target === overlay){

        overlay.classList.remove("show");
        document.body.style.overflow = "";

    }

};

document.addEventListener("keydown",(e)=>{

    if(e.key==="Escape"){

        overlay.classList.remove("show");
        document.body.style.overflow = "";

    }

});

const viewer = document.getElementById("imageViewer");
const viewerImg = viewer.querySelector("img");


document.addEventListener("click",(e)=>{

    const card = e.target.closest(".card");


    if(card && !moved && !selectedCard){

        viewerImg.src = card.querySelector("img").src;

        viewer.classList.add("show");

    }

});


viewer.onclick = ()=>{

    viewer.classList.remove("show");

};
    
createCards();    
load();

</script>
    
</body>
</html>
